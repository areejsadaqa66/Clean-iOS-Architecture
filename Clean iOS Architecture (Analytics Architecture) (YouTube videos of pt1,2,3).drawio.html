;div&amp;gt;Presentation knows: protocols only&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;Analytics knows: 3rd party SDKs&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;Business Logic knows: nothing about outer layers&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;&amp;lt;br&amp;gt;&amp;lt;/div&amp;gt;&amp;lt;div&amp;gt;Inner layers are STABLE. Outer layers change.&amp;lt;/div&amp;gt;\&quot; vertex=\&quot;1\&quot;&gt;&lt;mxGeometry height=\&quot;220\&quot; width=\&quot;380\&quot; x=\&quot;5900\&quot; y=\&quot;1220\&quot; as=\&quot;geometry\&quot;/&gt;&lt;/mxCell&gt;&lt;/root&gt;&lt;/mxGraphModel&gt;&lt;/diagram&gt;&lt;/mxfile&gt;&quot;,&quot;toolbar&quot;:&quot;pages zoom layers lightbox&quot;,&quot;page&quot;:0}"></div>
